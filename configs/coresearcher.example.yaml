environment: local

persistence:
  backend: json
  data_dir: .coresearcher/data

gateway:
  title: CoResearcher API
  cors_origins: []

security:
  default_user_id: local-user
  max_subagent_concurrency: 3
  allowed_mcp_servers: []

sandbox:
  timeout_seconds: 30
  max_output_chars: 20000
  max_write_chars: 200000
  network_enabled: false
  allow_bash: false
  artifact_root: .coresearcher/artifacts
  allowed_roots:
    - .coresearcher/workspaces

tools:
  builtins:
    enabled: true
  sandbox:
    enabled: true
  subagent_delegation:
    enabled: true
    director_only: true
  policy:
    default_allowed_groups: []
    denied_tools: []
    allowed_mcp_servers: []
  search_providers:
    fake:
      enabled: false
    ddg:
      enabled: false
    jina_ai:
      enabled: false
      secret_env: JINA_API_KEY
    serper:
      enabled: false
      secret_env: SERPER_API_KEY
    brave:
      enabled: false
      secret_env: BRAVE_SEARCH_API_KEY
    tavily:
      enabled: false
      secret_env: TAVILY_API_KEY
    firecrawl:
      enabled: false
      secret_env: FIRECRAWL_API_KEY
    browserless:
      enabled: false
      secret_env: BROWSERLESS_API_KEY
    exa:
      enabled: false
      secret_env: EXA_API_KEY
    arxiv:
      enabled: false
    semantic_scholar:
      enabled: false
      secret_env: SEMANTIC_SCHOLAR_API_KEY
    crossref:
      enabled: false
  mcp_servers: []
  external_agents: {}
  skills:
    builtin_root: backend/coresearcher/skills/builtin
    storage_root: storage/skills

context:
  default_prompt_budget: 12000
  completion_reserve: 2000
  director_prompt_budget: 12000
  subagent_prompt_budget: 8000
  per_section_limits:
    history: 2000
    memory: 2000
    evidence: 3000
    tool_output: 1500
    skill_context: 1500
  tool_output_char_limit: 6000
  long_document_snippet_limit: 1200
  emergency_summary_enabled: true
  compression_thresholds:
    level_1: 0.75
    level_2: 1.10
    level_3: 1.55
    level_4: 2.25
    level_5: 3.20
  reserved_tags:
    - memory-context
    - research-state
    - evidence-context
    - tool-output
    - skill-context
    - omitted-context
    - latest-user-message
    - subagent-task
    - system
    - developer
  renderer_blocks:
    memory: memory-context
    research_state: research-state
    evidence: evidence-context
    tool_output: tool-output
    skill: skill-context
    omitted: omitted-context
